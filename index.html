<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lucky Color Oracle</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --void: #080612;
      --deep: #0f0c1e;
      --gold: #c9a84c;
      --gold-dim: rgba(201,168,76,0.45);
      --gold-glow: rgba(201,168,76,0.18);
      --parchment: #ede4cc;
      --muted: rgba(237,228,204,0.5);
      --err: #e05a5a;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      min-height: 100vh;
      background: var(--void);
      color: var(--parchment);
      font-family: 'Cormorant Garamond', serif;
      display: flex; flex-direction: column; align-items: center;
      overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0; opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 9999;
    }
    #starCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    .wrap {
      position: relative; z-index: 1;
      width: 100%; max-width: 580px;
      padding: 52px 24px 80px;
      display: flex; flex-direction: column; align-items: center;
    }

    /* ── Header ── */
    .eyebrow { font-size: 10px; letter-spacing: 7px; text-transform: uppercase; color: var(--gold); opacity: .65; margin-bottom: 14px; animation: fadeDown 1s both; }
    h1 { font-family: 'Cinzel Decorative', serif; font-size: clamp(20px,5vw,32px); color: var(--parchment); text-align: center; line-height: 1.3; text-shadow: 0 0 40px var(--gold-dim),0 0 80px var(--gold-glow); animation: fadeDown 1.1s both; margin-bottom: 10px; }
    .rule { width: 200px; height: 1px; background: linear-gradient(to right,transparent,var(--gold),transparent); margin: 0 auto 36px; animation: fadeDown 1.2s both; }

    /* ── Inputs ── */
    .input-panel { width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 20px 28px; margin-bottom: 6px; animation: fadeDown 1.3s both; }
    .field { display: flex; flex-direction: column; gap: 8px; }
    .field label { font-size: 10px; letter-spacing: 4px; text-transform: uppercase; color: var(--gold); opacity: .6; }
    .req { color: var(--err); opacity: .8; }
    .field input {
      background: transparent; border: none; border-bottom: 1px solid rgba(201,168,76,.35);
      color: var(--parchment); font-family: 'Cormorant Garamond', serif; font-size: 17px;
      padding: 5px 2px; outline: none; transition: border-color .3s; width: 100%;
    }
    .field input:focus { border-bottom-color: var(--gold); }
    .field input::placeholder { color: rgba(237,228,204,.25); font-style: italic; }
    .field input.ef { border-bottom-color: var(--err) !important; }

    .vmsg { font-size: 12px; font-style: italic; color: var(--err); opacity: 0; text-align: center; margin: 8px 0 20px; transition: opacity .3s; min-height: 18px; }
    .vmsg.on { opacity: 1; }

    /* ── Already banner ── */
    .already {
      width: 100%; border: 1px solid rgba(201,168,76,.2); border-radius: 10px;
      background: rgba(201,168,76,.05); padding: 12px 18px; margin-bottom: 18px;
      text-align: center; font-size: 13px; font-style: italic; color: var(--gold); opacity: .85;
      display: none; animation: fadeUp .4s both;
    }

    /* ── Saju panel ── */
    .saju-panel {
      width: 100%; border: 1px solid rgba(201,168,76,.15); border-radius: 12px;
      background: rgba(255,255,255,.02); padding: 18px 22px; margin-bottom: 24px;
      display: none; animation: fadeUp .5s both;
    }
    .saju-panel.on { display: block; }
    .saju-title { font-size: 10px; letter-spacing: 5px; text-transform: uppercase; color: var(--gold); opacity: .5; margin-bottom: 14px; text-align: center; }
    .saju-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 12px; }
    .saju-col { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .saju-col-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); opacity: .4; }
    .saju-char { font-family: 'Cinzel Decorative', serif; font-size: 19px; color: var(--parchment); text-shadow: 0 0 15px var(--gold-dim); }
    .saju-sub { font-size: 11px; color: var(--muted); font-style: italic; }
    .saju-desc { font-size: 13px; font-style: italic; color: var(--muted); text-align: center; line-height: 1.7; padding-top: 10px; border-top: 1px solid rgba(201,168,76,.1); }

    /* ── Card ── */
    .card-stage { perspective: 1400px; margin-bottom: 28px; }
    .card-wrapper { position: relative; width: 280px; height: 400px; transform-style: preserve-3d; transition: transform 1.1s cubic-bezier(.34,1.2,.64,1); }
    .card-wrapper.flipped { transform: rotateY(180deg); }
    .face { position: absolute; inset: 0; border-radius: 20px; backface-visibility: hidden; -webkit-backface-visibility: hidden; overflow: hidden; border: 1px solid rgba(201,168,76,.3); }

    /* Back */
    .back { background: radial-gradient(ellipse at 50% 30%,#1a1030 0%,var(--deep) 70%); display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 60px rgba(0,0,0,.7),inset 0 0 60px rgba(0,0,0,.5); }
    .back-pattern { position: absolute; inset: 0; opacity: .14; background-image: repeating-linear-gradient(45deg,transparent,transparent 12px,rgba(201,168,76,.5) 12px,rgba(201,168,76,.5) 13px),repeating-linear-gradient(-45deg,transparent,transparent 12px,rgba(201,168,76,.5) 12px,rgba(201,168,76,.5) 13px); }
    .back-mandala { position: relative; z-index: 1; }

    /* Front */
    .front { transform: rotateY(180deg); background: var(--deep); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px 22px; gap: 11px; box-shadow: 0 8px 80px rgba(0,0,0,.6); }

    .orb-wrap { position: relative; width: 100px; height: 100px; display: flex; align-items: center; justify-content: center; }
    .orb-ring { position: absolute; inset: -10px; border-radius: 50%; border: 1px solid var(--gold-dim); animation: spin 12s linear infinite; }
    .orb-ring::before { content: ''; position: absolute; top: -3px; left: 50%; transform: translateX(-50%); width: 5px; height: 5px; border-radius: 50%; background: var(--gold); }
    @keyframes spin { to { transform: rotate(360deg); } }

    .orb { width: 86px; height: 86px; border-radius: 50%; position: relative; }
    .orb::after { content: ''; position: absolute; top: 14%; left: 18%; width: 28%; height: 18%; background: rgba(255,255,255,.4); border-radius: 50%; transform: rotate(-35deg); filter: blur(3px); }

    .card-badge { position: absolute; top: 14px; right: 14px; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); opacity: .6; border: 1px solid rgba(201,168,76,.25); border-radius: 20px; padding: 3px 10px; }
    .card-personal { font-size: 11px; letter-spacing: 3.5px; text-transform: uppercase; color: var(--gold); opacity: .65; }
    .card-color-name { font-family: 'Cinzel Decorative', serif; font-size: 17px; letter-spacing: 2px; color: var(--parchment); text-shadow: 0 0 25px var(--gold-dim); }
    .card-keyword { font-size: 10px; letter-spacing: 5px; text-transform: uppercase; color: var(--gold); opacity: .5; }
    .card-fortune { font-size: 13px; font-style: italic; font-weight: 300; color: var(--muted); text-align: center; line-height: 1.9; min-height: 78px; display: flex; align-items: center; justify-content: center; }
    .card-fortune.loading { animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:.8} }

    .card-shimmer { position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: linear-gradient(to right,transparent,var(--gold),transparent); opacity: 0; transition: opacity .5s; }
    .card-wrapper.flipped .card-shimmer { opacity: .6; }

    .particles { position: absolute; inset: 0; pointer-events: none; overflow: hidden; border-radius: 20px; }
    .p { position: absolute; width: 2px; height: 2px; border-radius: 50%; background: var(--gold); bottom: -4px; animation: rise var(--d,5s) ease-in-out var(--delay,0s) infinite; opacity: 0; }
    @keyframes rise { 0%{opacity:0;transform:translateY(0) translateX(0) scale(.5)} 25%{opacity:.8} 100%{opacity:0;transform:translateY(-420px) translateX(var(--dx,0px)) scale(1.5)} }

    /* ── Buttons ── */
    .btn-row { display: flex; gap: 14px; margin-bottom: 44px; flex-wrap: wrap; justify-content: center; animation: fadeUp 1.5s both; }
    .btn { font-family: 'Cinzel Decorative', serif; font-size: 11px; letter-spacing: 2.5px; padding: 13px 32px; border-radius: 3px; cursor: pointer; transition: all .3s; position: relative; overflow: hidden; }
    .btn::after { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg,rgba(255,255,255,0) 40%,rgba(255,255,255,.06) 100%); opacity: 0; transition: opacity .3s; }
    .btn:hover::after { opacity: 1; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-primary { background: rgba(201,168,76,.1); border: 1px solid rgba(201,168,76,.55); color: var(--gold); box-shadow: 0 0 30px rgba(201,168,76,.08); }
    .btn-primary:hover:not(:disabled) { background: rgba(201,168,76,.18); box-shadow: 0 0 40px rgba(201,168,76,.2); transform: translateY(-2px); }
    .btn-ghost { background: transparent; border: 1px solid rgba(237,228,204,.15); color: var(--muted); }
    .btn-ghost:hover { border-color: rgba(237,228,204,.35); color: var(--parchment); }
    .hidden { display: none !important; }

    /* ── Section label ── */
    .section-label { font-size: 10px; letter-spacing: 6px; text-transform: uppercase; color: var(--gold); opacity: .45; text-align: center; margin-bottom: 16px; }

    /* ── History ── */
    .history-wrap { width: 100%; margin-bottom: 32px; animation: fadeUp .5s both; }
    .history-list { display: flex; flex-direction: column; gap: 10px; }
    .h-item { display: flex; align-items: flex-start; gap: 14px; padding: 12px 16px; border: 1px solid rgba(201,168,76,.1); border-radius: 8px; background: rgba(255,255,255,.018); animation: slideIn .4s both; }
    .h-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; }
    .h-cname { font-family: 'Cinzel Decorative', serif; font-size: 11px; letter-spacing: 1.5px; color: var(--parchment); flex: 0 0 66px; }
    .h-text { font-size: 13px; font-style: italic; color: var(--muted); line-height: 1.5; flex: 1; }
    .h-time { font-size: 10px; letter-spacing: 1px; color: var(--gold); opacity: .4; flex-shrink: 0; }
    @keyframes slideIn { from{opacity:0;transform:translateX(-12px)} to{opacity:1;transform:none} }

    /* ── Stats ── */
    .stats-wrap { width: 100%; margin-top: 8px; animation: fadeUp .5s both; }
    .stat-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    .stat-name { width: 56px; font-size: 11px; letter-spacing: 1.5px; text-transform: capitalize; color: var(--gold); opacity: .6; }
    .stat-track { flex: 1; height: 3px; background: rgba(255,255,255,.06); border-radius: 3px; overflow: hidden; }
    .stat-fill { height: 100%; border-radius: 3px; transition: width .9s cubic-bezier(.34,1.2,.64,1); }
    .stat-n { width: 16px; text-align: right; font-size: 11px; color: var(--muted); opacity: .5; }

    @keyframes fadeDown { from{opacity:0;transform:translateY(-16px)} to{opacity:1;transform:none} }
    @keyframes fadeUp   { from{opacity:0;transform:translateY(16px)}  to{opacity:1;transform:none} }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
    .shake { animation: shake .4s ease; }
  </style>
</head>
<body>

<canvas id="starCanvas"></canvas>

<div class="wrap">
  <p class="eyebrow">✦ &nbsp; Chromatic Oracle &nbsp; ✦</p>
  <h1>Today's Lucky Color</h1>
  <div class="rule"></div>

  <!-- Inputs -->
  <div class="input-panel">
    <div class="field">
      <label>이름 <span class="req">*</span></label>
      <input type="text" id="nameIn" placeholder="홍길동" maxlength="16"/>
    </div>
    <div class="field">
      <label>생년월일 <span class="req">*</span></label>
      <input type="text" id="dobIn" placeholder="19900101" maxlength="8"/>
    </div>
  </div>
  <div class="vmsg" id="vmsg"></div>

  <!-- Already read today -->
  <div class="already" id="alreadyBanner"></div>

  <!-- Saju -->
  <div class="saju-panel" id="sajuPanel">
    <p class="saju-title">— 사주 정보 —</p>
    <div class="saju-grid" id="sajuGrid"></div>
    <p class="saju-desc" id="sajuDesc"></p>
  </div>

  <!-- Card -->
  <div class="card-stage">
    <div class="card-wrapper" id="cardWrap">
      <!-- Back -->
      <div class="face back">
        <div class="back-pattern"></div>
        <div class="back-mandala">
          <svg width="180" height="180" viewBox="0 0 180 180" fill="none">
            <circle cx="90" cy="90" r="80" stroke="#c9a84c" stroke-width=".6" opacity=".4"/>
            <circle cx="90" cy="90" r="60" stroke="#c9a84c" stroke-width=".6" opacity=".4"/>
            <circle cx="90" cy="90" r="40" stroke="#c9a84c" stroke-width=".6" opacity=".4"/>
            <circle cx="90" cy="90" r="20" stroke="#c9a84c" stroke-width=".8" opacity=".5"/>
            <line x1="90" y1="5"   x2="90"  y2="175" stroke="#c9a84c" stroke-width=".4" opacity=".3"/>
            <line x1="5"  y1="90"  x2="175" y2="90"  stroke="#c9a84c" stroke-width=".4" opacity=".3"/>
            <line x1="34" y1="34"  x2="146" y2="146" stroke="#c9a84c" stroke-width=".4" opacity=".3"/>
            <line x1="146" y1="34" x2="34"  y2="146" stroke="#c9a84c" stroke-width=".4" opacity=".3"/>
            <polygon points="90,18 96,72 148,56 102,90 148,124 96,108 90,162 84,108 32,124 78,90 32,56 84,72"
              fill="none" stroke="#c9a84c" stroke-width=".7" opacity=".55"/>
            <circle cx="90" cy="90" r="5" fill="#c9a84c" opacity=".6"/>
            <ellipse cx="90" cy="50" rx="5" ry="14" fill="#c9a84c" opacity=".1" transform="rotate(0 90 90)"/>
            <ellipse cx="90" cy="50" rx="5" ry="14" fill="#c9a84c" opacity=".1" transform="rotate(45 90 90)"/>
            <ellipse cx="90" cy="50" rx="5" ry="14" fill="#c9a84c" opacity=".1" transform="rotate(90 90 90)"/>
            <ellipse cx="90" cy="50" rx="5" ry="14" fill="#c9a84c" opacity=".1" transform="rotate(135 90 90)"/>
          </svg>
        </div>
        <div class="particles" id="backPart"></div>
      </div>
      <!-- Front -->
      <div class="face front" id="frontFace">
        <p class="card-badge" id="cardBadge"></p>
        <p class="card-personal" id="cardPersonal">✦ &nbsp; &nbsp; ✦</p>
        <div class="orb-wrap">
          <div class="orb-ring"></div>
          <div class="orb" id="colorOrb"></div>
        </div>
        <p class="card-color-name" id="cardColorName"></p>
        <p class="card-keyword" id="cardKeyword"></p>
        <p class="card-fortune" id="cardFortune"></p>
        <div class="particles" id="frontPart"></div>
        <div class="card-shimmer"></div>
      </div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" id="drawBtn" onclick="tryDraw()">✦ &nbsp;Draw Your Color&nbsp; ✦</button>
    <button class="btn btn-ghost hidden" id="againBtn" onclick="resetCard()">다시 입력</button>
  </div>

  <!-- History -->
  <div class="history-wrap hidden" id="historyWrap">
    <p class="section-label">— &nbsp; Color Journey &nbsp; —</p>
    <div class="history-list" id="historyList"></div>
  </div>

  <!-- Stats -->
  <div class="stats-wrap hidden" id="statsWrap" style="margin-top:32px">
    <p class="section-label">— &nbsp; Frequency &nbsp; —</p>
    <div id="statsBars"></div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════
   STARS
═══════════════════════════════════════ */
const cv = document.getElementById('starCanvas');
const cx = cv.getContext('2d');
let stars = [];
function buildStars() {
  cv.width = innerWidth; cv.height = innerHeight;
  stars = Array.from({length:180}, () => ({
    x: Math.random()*cv.width, y: Math.random()*cv.height,
    r: Math.random()*1.1+.2, phase: Math.random()*Math.PI*2,
    speed: .003+Math.random()*.004, gold: Math.random()>.6
  }));
}
function tickStars() {
  cx.clearRect(0,0,cv.width,cv.height);
  const t = performance.now()/1000;
  stars.forEach(s => {
    const a = .15+.5*Math.abs(Math.sin(s.phase+t*s.speed));
    cx.beginPath(); cx.arc(s.x,s.y,s.r,0,Math.PI*2);
    cx.fillStyle = s.gold?`rgba(201,168,76,${a})`:`rgba(200,190,220,${a*.7})`;
    cx.fill();
  });
  requestAnimationFrame(tickStars);
}
buildStars(); tickStars();
addEventListener('resize', buildStars);

/* ═══════════════════════════════════════
   PARTICLES
═══════════════════════════════════════ */
function spawnParticles(el, n=14) {
  el.innerHTML = '';
  for (let i=0;i<n;i++) {
    const p = document.createElement('div');
    p.className = 'p';
    p.style.cssText = `left:${5+Math.random()*90}%;--d:${4+Math.random()*5}s;--delay:${Math.random()*4}s;--dx:${(Math.random()-.5)*40}px`;
    el.appendChild(p);
  }
}

/* ═══════════════════════════════════════
   DETERMINISTIC SEED
═══════════════════════════════════════ */
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
}
function djb2(str) {
  let h = 5381;
  for (let i=0;i<str.length;i++) { h = ((h<<5)+h)^str.charCodeAt(i); h = h>>>0; }
  return h;
}
function seededPick(seed, arr) {
  const next = (seed*1664525+1013904223)>>>0;
  return arr[next % arr.length];
}

/* ═══════════════════════════════════════
   SAJU (사주팔자) — 4 Pillars
   Based on simplified Ganzhi calendar.
═══════════════════════════════════════ */
const CG  = ['갑','을','병','정','무','기','경','신','임','계'];
const JJ  = ['자','축','인','묘','진','사','오','미','신','유','술','해'];
const CGH = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
const JJH = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
const ANIMAL = ['쥐','소','호랑이','토끼','용','뱀','말','양','원숭이','닭','개','돼지'];
const ELEM_KOR = ['木','木','火','火','土','土','金','金','水','水'];
const ELEM_NAME = ['목(木)','목(木)','화(火)','화(火)','토(土)','토(土)','금(金)','금(金)','수(水)','수(水)'];
// color ohaeng
const COLOR_ELEM = { crimson:'火',amber:'火',gold:'土',jade:'木',cobalt:'水',indigo:'水',violet:'木',rose:'火',silver:'金',obsidian:'水',teal:'木',bronze:'金' };

function jd(y,m,d) {
  const a=Math.floor((14-m)/12), yr=y+4800-a, mo=m+12*a-3;
  return d+Math.floor((153*mo+2)/5)+365*yr+Math.floor(yr/4)-Math.floor(yr/100)+Math.floor(yr/400)-32045;
}

function getSaju(dob) {
  const y=+dob.slice(0,4), m=+dob.slice(4,6), d=+dob.slice(6,8);
  if (!y||!m||!d||m<1||m>12||d<1||d>31) return null;
  const yCG = ((y-4)%10+10)%10;
  const yJJ = ((y-4)%12+12)%12;
  const mCG = ((yCG%5)*2+(m-1))%10;
  const mJJ = ((m+1)%12+12)%12;
  const jdn = jd(y,m,d);
  const dCG = ((jdn+49)%10+10)%10;
  const dJJ = ((jdn+11)%12+12)%12;
  const hJJ = 6; // 午시 (noon)
  const hCG = ((dCG%5)*2+Math.floor(hJJ/2))%10;
  return { year:{cg:yCG,jj:yJJ}, month:{cg:mCG,jj:mJJ}, day:{cg:dCG,jj:dJJ}, hour:{cg:hCG,jj:hJJ} };
}

function renderSaju(saju, name) {
  if (!saju) return;
  document.getElementById('sajuPanel').classList.add('on');
  const pillars = [
    {label:'연주(年)',...saju.year},
    {label:'월주(月)',...saju.month},
    {label:'일주(日)',...saju.day},
    {label:'시주(時)',...saju.hour},
  ];
  document.getElementById('sajuGrid').innerHTML = pillars.map(p=>`
    <div class="saju-col">
      <span class="saju-col-label">${p.label}</span>
      <span class="saju-char">${CGH[p.cg]}${JJH[p.jj]}</span>
      <span class="saju-sub">${CG[p.cg]}${JJ[p.jj]}</span>
    </div>`).join('');
  const dayKor = CG[saju.day.cg]+JJ[saju.day.jj];
  document.getElementById('sajuDesc').textContent =
    `${name}님은 ${ANIMAL[saju.year.jj]}띠이며, 일주(日柱)는 ${dayKor}(${ELEM_NAME[saju.day.cg]})입니다.`;
}

/* ═══════════════════════════════════════
   COLOR DATA
═══════════════════════════════════════ */
const COLORS = {
  crimson : { hex:'#c0392b', glow:'rgba(192,57,43,.75)',   kw:'열정 · 용기 · 생명력' },
  amber   : { hex:'#e67e22', glow:'rgba(230,126,34,.75)',  kw:'창조 · 온기 · 활력'   },
  gold    : { hex:'#f1c40f', glow:'rgba(241,196,15,.75)',  kw:'풍요 · 명료 · 기쁨'   },
  jade    : { hex:'#27ae60', glow:'rgba(39,174,96,.75)',   kw:'치유 · 성장 · 균형'   },
  cobalt  : { hex:'#2980b9', glow:'rgba(41,128,185,.75)',  kw:'직관 · 평온 · 지혜'   },
  indigo  : { hex:'#3d3a8c', glow:'rgba(90,80,200,.75)',   kw:'신비 · 내면 · 통찰'   },
  violet  : { hex:'#8e44ad', glow:'rgba(142,68,173,.75)',  kw:'영감 · 초월 · 상상'   },
  rose    : { hex:'#e84393', glow:'rgba(232,67,147,.75)',  kw:'사랑 · 공감 · 조화'   },
  silver  : { hex:'#bdc3c7', glow:'rgba(189,195,199,.65)', kw:'순수 · 명상 · 새벽'  },
  obsidian: { hex:'#4a4060', glow:'rgba(74,64,96,.9)',     kw:'깊이 · 우아 · 침묵'   },
  teal    : { hex:'#16a085', glow:'rgba(22,160,133,.75)',  kw:'재생 · 유연 · 흐름'   },
  bronze  : { hex:'#a0522d', glow:'rgba(160,82,45,.75)',   kw:'인내 · 단단함 · 신뢰' },
};
const COLOR_KEYS = Object.keys(COLORS);

let history = [], counts = {};

/* ═══════════════════════════════════════
   OHAENG RELATIONSHIP
═══════════════════════════════════════ */
// 상생: 木→火→土→金→水→木
// 상극: 木→土→水→火→金→木
const SAENGSAN = {木:'火',火:'土',土:'金',金:'水',水:'木'};
const GEUK     = {木:'土',火:'金',土:'水',金:'木',水:'火'};

function ohaengRelation(dayElem, colorElem) {
  if (dayElem === colorElem) return '동기(同氣) — 같은 기운이 오늘을 든든히 받쳐줍니다.';
  if (SAENGSAN[dayElem] === colorElem) return `상생(相生) — ${dayElem}이 ${colorElem}을 낳아, 오늘의 기운이 당신에게 힘을 불어넣습니다.`;
  if (SAENGSAN[colorElem] === dayElem) return `상생(相生) — ${colorElem}이 ${dayElem}을 키워, 오늘 색이 당신의 일주를 풍요롭게 합니다.`;
  if (GEUK[dayElem] === colorElem) return `상극(相剋) — ${dayElem}이 ${colorElem}을 누르지만, 그 긴장이 오히려 집중력을 높입니다.`;
  return `상극(相剋) — ${colorElem}이 ${dayElem}에 도전하며, 오늘은 변화와 각성의 날입니다.`;
}

/* ═══════════════════════════════════════
   SESSION CACHE
═══════════════════════════════════════ */
function sKey(name,dob) { return `oracle_${name.toLowerCase()}_${dob}_${todayStr()}`; }
function saveRes(name,dob,colorKey,fortune) {
  try { sessionStorage.setItem(sKey(name,dob), JSON.stringify({colorKey,fortune})); } catch(e){}
}
function loadRes(name,dob) {
  try { const r=sessionStorage.getItem(sKey(name,dob)); return r?JSON.parse(r):null; } catch(e){return null;}
}

/* ═══════════════════════════════════════
   AI FORTUNE
═══════════════════════════════════════ */
async function genFortune(colorKey, saju, name, dob) {
  const c = COLORS[colorKey];
  const y=dob.slice(0,4), m=dob.slice(4,6), d=dob.slice(6,8);
  let sajuStr = '';
  let ohaengStr = '';
  if (saju) {
    sajuStr = `사주: 연주 ${CGH[saju.year.cg]}${JJH[saju.year.jj]}, 월주 ${CGH[saju.month.cg]}${JJH[saju.month.jj]}, 일주 ${CGH[saju.day.cg]}${JJH[saju.day.jj]} (${ELEM_NAME[saju.day.cg]}), 시주 ${CGH[saju.hour.cg]}${JJH[saju.hour.jj]}. 띠: ${ANIMAL[saju.year.jj]}띠.`;
    const de = ELEM_KOR[saju.day.cg];
    const ce = COLOR_ELEM[colorKey]||'土';
    ohaengStr = `오행 관계: 일주 오행(${de}) vs 오늘 색상 오행(${ce}) — ${ohaengRelation(de,ce)}`;
  }
  const prompt = `당신은 사주와 색채 기운을 결합하는 신비로운 오라클입니다.
의뢰인: ${name} (${y}년 ${m}월 ${d}일생)
오늘의 행운 색상: ${colorKey} / 키워드: ${c.kw}
${sajuStr}
${ohaengStr}

위 정보를 바탕으로 오늘의 운세를 3~4문장으로 작성하세요.
- 한국어, 시적이고 신비로운 문체
- 사주 일주 오행과 색상 오행의 관계를 자연스럽게 녹여서 표현
- 구체적인 오늘의 조언 한 가지 포함
- 이모지·해시태그·인용부호 없이 바로 운세 문장으로 시작`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      model:'claude-sonnet-4-20250514', max_tokens:1000,
      messages:[{role:'user',content:prompt}]
    })
  });
  const data = await res.json();
  return data.content?.[0]?.text?.trim() ?? '오늘 이 색이 당신만을 위해 선택되었습니다.';
}

/* ═══════════════════════════════════════
   VALIDATION
═══════════════════════════════════════ */
function validate(name, dob) {
  if (!name) return '이름을 입력해 주세요.';
  if (!dob || dob.length!==8 || isNaN(Number(dob))) return '생년월일을 8자리 숫자로 입력하세요. (예: 19900101)';
  const y=+dob.slice(0,4), mo=+dob.slice(4,6), d=+dob.slice(6,8);
  if (y<1900||y>2099||mo<1||mo>12||d<1||d>31) return '올바른 날짜를 입력해 주세요.';
  return null;
}
function showErr(msg) {
  const el=document.getElementById('vmsg');
  el.textContent=msg; el.classList.add('on');
  if (!document.getElementById('nameIn').value.trim()) document.getElementById('nameIn').classList.add('ef');
  if (document.getElementById('dobIn').value.trim().length!==8) document.getElementById('dobIn').classList.add('ef');
  const btn=document.getElementById('drawBtn');
  btn.classList.remove('shake'); void btn.offsetWidth; btn.classList.add('shake');
}
function clearErr() {
  document.getElementById('vmsg').classList.remove('on');
  document.getElementById('nameIn').classList.remove('ef');
  document.getElementById('dobIn').classList.remove('ef');
}

/* ═══════════════════════════════════════
   CARD UI
═══════════════════════════════════════ */
function setCardColor(colorKey) {
  const c = COLORS[colorKey];
  const orb = document.getElementById('colorOrb');
  orb.style.background = c.hex;
  orb.style.boxShadow = `0 0 50px ${c.glow},0 0 100px ${c.glow},inset 0 0 20px rgba(255,255,255,.25)`;
  document.getElementById('frontFace').style.background =
    `radial-gradient(ellipse at 50% 25%,${c.hex}28 0%,#0f0c1e 65%)`;
  document.getElementById('cardColorName').textContent = colorKey.charAt(0).toUpperCase()+colorKey.slice(1);
  document.getElementById('cardKeyword').textContent = c.kw;
}
function setCardFortune(text, loading=false) {
  const el = document.getElementById('cardFortune');
  el.textContent = text;
  el.classList.toggle('loading', loading);
}
function setCardBadge(name) {
  const today = todayStr();
  document.getElementById('cardBadge').textContent = `${today.slice(0,4)}.${today.slice(4,6)}.${today.slice(6,8)}`;
  document.getElementById('cardPersonal').textContent = `✦  ${name}의 오늘  ✦`;
}

/* ═══════════════════════════════════════
   MAIN DRAW
═══════════════════════════════════════ */
async function tryDraw() {
  const name = document.getElementById('nameIn').value.trim();
  const dob  = document.getElementById('dobIn').value.trim();
  const err  = validate(name, dob);
  if (err) { showErr(err); return; }
  clearErr();

  const drawBtn = document.getElementById('drawBtn');
  drawBtn.disabled = true; drawBtn.textContent = '점괘를 읽는 중…';

  // Saju
  const saju = getSaju(dob);
  renderSaju(saju, name);

  // Deterministic color
  const seed     = djb2(name.toLowerCase() + dob + todayStr());
  const colorKey = seededPick(seed, COLOR_KEYS);

  // Set basic card info
  setCardBadge(name);
  setCardColor(colorKey);
  spawnParticles(document.getElementById('frontPart'));

  // Check session cache
  const cached = loadRes(name, dob);

  if (cached && cached.colorKey === colorKey) {
    // Same person, same day → show cached
    setCardFortune(cached.fortune);
    setTimeout(() => document.getElementById('cardWrap').classList.add('flipped'), 200);

    const banner = document.getElementById('alreadyBanner');
    banner.style.display = 'block';
    banner.textContent = '오늘의 점괘는 이미 열려 있습니다. 같은 색운이 당신을 기다리고 있었습니다.';

    addHistory(colorKey, cached.fortune);
  } else {
    document.getElementById('alreadyBanner').style.display = 'none';
    setCardFortune('운명의 실을 읽고 있습니다…', true);
    setTimeout(() => document.getElementById('cardWrap').classList.add('flipped'), 200);

    try {
      const fortune = await genFortune(colorKey, saju, name, dob);
      setCardFortune(fortune);
      saveRes(name, dob, colorKey, fortune);
      addHistory(colorKey, fortune);
    } catch {
      setCardFortune('오늘, 이 색이 당신만을 위해 선택되었습니다.');
    }
  }

  drawBtn.classList.add('hidden');
  document.getElementById('againBtn').classList.remove('hidden');
}

function addHistory(colorKey, fortune) {
  const ts = new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
  history.unshift({ colorKey, fortune, ts });
  counts[colorKey] = (counts[colorKey]||0)+1;
  renderHistory(); renderStats();
}

function resetCard() {
  document.getElementById('cardWrap').classList.remove('flipped');
  document.getElementById('sajuPanel').classList.remove('on');
  document.getElementById('alreadyBanner').style.display = 'none';
  const drawBtn = document.getElementById('drawBtn');
  drawBtn.disabled = false; drawBtn.textContent = '✦  Draw Your Color  ✦';
  drawBtn.classList.remove('hidden');
  document.getElementById('againBtn').classList.add('hidden');
  document.getElementById('nameIn').value = '';
  document.getElementById('dobIn').value = '';
  clearErr();
  spawnParticles(document.getElementById('backPart'));
}

/* ═══════════════════════════════════════
   HISTORY & STATS
═══════════════════════════════════════ */
function renderHistory() {
  document.getElementById('historyWrap').classList.remove('hidden');
  const list = document.getElementById('historyList');
  list.innerHTML = '';
  history.forEach(({colorKey,fortune,ts}) => {
    const c = COLORS[colorKey];
    const item = document.createElement('div');
    item.className = 'h-item';
    item.innerHTML = `
      <span class="h-dot" style="background:${c.hex};box-shadow:0 0 8px ${c.glow}"></span>
      <span class="h-cname">${colorKey}</span>
      <span class="h-text">${fortune}</span>
      <span class="h-time">${ts}</span>`;
    list.appendChild(item);
  });
}
function renderStats() {
  if (Object.keys(counts).length < 2) return;
  document.getElementById('statsWrap').classList.remove('hidden');
  const bars = document.getElementById('statsBars');
  bars.innerHTML = '';
  const max = Math.max(...Object.values(counts));
  Object.entries(counts).sort((a,b)=>b[1]-a[1]).forEach(([key,n]) => {
    const c = COLORS[key];
    const row = document.createElement('div'); row.className = 'stat-row';
    row.innerHTML = `<span class="stat-name">${key}</span><div class="stat-track"><div class="stat-fill" style="width:${n/max*100}%;background:${c.hex}"></div></div><span class="stat-n">${n}</span>`;
    bars.appendChild(row);
  });
}

/* ═══════════════════════════════════════
   INIT
═══════════════════════════════════════ */
spawnParticles(document.getElementById('backPart'));
['nameIn','dobIn'].forEach(id => document.getElementById(id).addEventListener('input', clearErr));
document.getElementById('dobIn').addEventListener('input', e => {
  e.target.value = e.target.value.replace(/\D/g,'').slice(0,8);
});
</script>
